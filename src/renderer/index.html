<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!--
      Strict Content Security Policy.
      - default-src 'self': only load resources from this app.
      - 'unsafe-inline' for styles is required for the Vite dev server's HMR client and
        Tailwind's runtime style injection in dev. Production builds emit static CSS files
        and the inline-style relaxation is harmless because all scripts are 'self'-only.
      - connect-src includes ws: for Vite HMR in dev. Remove ws: in stricter builds.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self' ws: wss: http://localhost:* http://127.0.0.1:*;"
    />
    <title>opencue</title>
  </head>
  <body class="bg-slate-950 text-slate-100">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
