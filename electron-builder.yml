appId: dev.opencue.app
productName: opencue
copyright: Copyright © 2026 opencue contributors

# Source paths produced by `electron-vite build`.
directories:
  output: release
  buildResources: build

# Files included inside the asar bundle.
files:
  - out/main/**
  - out/preload/**
  - out/renderer/**
  - package.json

# Files bundled OUTSIDE the asar (so they remain readable on disk).
# - sidecar/ stays in `resources/sidecar/` so the SidecarManager can spawn
#   `python3 main.py`. Phase-7-plus will swap this for a PyInstaller binary
#   per platform.
extraResources:
  - from: sidecar
    to: sidecar
    filter:
      - 'main.py'
      - 'requirements.txt'
      - 'README.md'

# Auto-update target — electron-updater fetches from this GitHub Release.
publish:
  provider: github
  owner: mudassar531
  repo: opencue
  releaseType: release

# Skip ASAR for native modules that don't unpack well; default is true.
asar: true
asarUnpack:
  - 'node_modules/electron-updater/**'

# Per-OS configurations.

mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  hardenedRuntime: true
  # Entitlements are required for the microphone + screen capture flow
  # (and notarization, when enabled).
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Set CSC_LINK + CSC_KEY_PASSWORD in CI to enable signing. Local dev
  # builds skip signing to keep contributor friction low.
  identity: null
  # Notarization toggles via APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD env vars.
  notarize: false
  extendInfo:
    NSMicrophoneUsageDescription: opencue captures meeting audio for on-device transcription.
    NSCameraUsageDescription: opencue does not use the camera. (Required only when the underlying Chromium asks.)
    NSScreenCaptureDescription: opencue captures screens / windows you pick for loopback audio and the optional 'ask about your screen' feature.

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
  writeUpdateInfo: true

win:
  target:
    - target: nsis
      arch:
        - x64
  publisherName: opencue contributors

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  artifactName: ${productName}-${version}-${arch}-setup.${ext}

linux:
  category: Utility
  maintainer: opencue contributors
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  desktop:
    StartupNotify: 'true'
  synopsis: Open-source meeting copilot with always-on-top overlay
